# 智能文档问答 Agent 配置模板
# 复制为 config.yaml 后修改
# 注意: config.yaml 包含 API Key，请勿提交到 Git

llm:
  provider: "deepseek"
  model: "deepseek-chat"
  api_key: "${DEEPSEEK_API_KEY}"   # 从环境变量读取，不写在文件里
  base_url: "https://api.deepseek.com/v1"
  temperature: 0.1
  max_tokens: 1024

ocr:
  engine: "tesseract"
  lang: "chi_sim"

embedding:
  model: "BAAI/bge-large-zh-v1.5"
  dimension: 1024

retrieval:
  top_k: 5
  score_threshold: 0.3

self_check:
  enabled: true
  min_evidence_length: 10
  hallucination_threshold: 0.2

chunking:
  max_chunk_size: 500
  overlap: 50

pdf:
  input_dir: "data"
  output_dir: "data/parsed"
